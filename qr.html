<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Códigos QR – Cazadores de Movimientos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    :root {
      --primary: #1a237e;
      --accent: #ff6f00;
      --bg: #f5f7fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #212121; }
    header {
      background: var(--primary);
      color: #fff;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 1.4rem; flex: 1; }
    header a { color: #fff; font-size: .85rem; opacity: .85; text-decoration: none; }
    header a:hover { opacity: 1; }

    .url-bar {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .url-bar label { font-size: .85rem; color: #555; white-space: nowrap; }
    .url-bar input {
      flex: 1;
      min-width: 280px;
      padding: 8px 12px;
      border: 2px solid #c5cae9;
      border-radius: 8px;
      font-size: .9rem;
      outline: none;
    }
    .url-bar input:focus { border-color: var(--primary); }
    .url-bar button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 9px 20px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
    }
    .url-bar button:hover { opacity: .88; }

    .hint {
      background: #e8eaf6;
      border-left: 4px solid var(--primary);
      margin: 24px 32px 0;
      padding: 12px 16px;
      border-radius: 4px;
      font-size: .85rem;
      color: #333;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
      padding: 24px 32px 48px;
    }
    .qr-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,.09);
      padding: 20px;
      text-align: center;
      page-break-inside: avoid;
    }
    .qr-card h3 {
      font-size: 1.1rem;
      color: var(--primary);
      margin-bottom: 4px;
    }
    .qr-card .sub {
      font-size: .75rem;
      color: #888;
      margin-bottom: 14px;
    }
    .qr-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 10px;
    }
    .qr-card .url-text {
      font-size: .65rem;
      color: #aaa;
      word-break: break-all;
    }

    .print-btn {
      display: block;
      margin: 0 auto 8px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 28px;
      cursor: pointer;
      font-size: .95rem;
      font-weight: 600;
    }
    .controls { text-align: center; padding: 0 0 16px; }

    @media print {
      header, .url-bar, .hint, .controls { display: none; }
      .grid { padding: 0; gap: 16px; }
      .qr-card { box-shadow: none; border: 1px solid #ddd; }
    }
  </style>
</head>
<body>

<header>
  <h1>🏃 Cazadores de Movimientos — Códigos QR</h1>
  <a href="index.html">← Volver al inicio</a>
</header>

<div class="url-bar">
  <label>URL base del sitio:</label>
  <input type="text" id="base-url" placeholder="https://usuario.github.io/repositorio" />
  <button onclick="generateQRs()">Generar QR</button>
</div>

<div class="hint">
  💡 Ingresa la URL de tu sitio en GitHub Pages (ej: <code>https://tuusuario.github.io/cazadores-movimientos</code>) y presiona <strong>Generar QR</strong>.
  Luego usa <strong>Ctrl + P</strong> para imprimir todos los códigos QR.
</div>

<div class="controls">
  <br/>
  <button class="print-btn" onclick="window.print()">🖨️ Imprimir todos los QR</button>
</div>

<div class="grid" id="qr-grid"></div>

<script>
  function generateQRs() {
    let base = document.getElementById('base-url').value.trim().replace(/\/$/, '');
    if (!base) {
      // Auto-detect from current location
      base = location.href.replace(/qr\.html.*$/, '').replace(/\/$/, '');
    }
    const grid = document.getElementById('qr-grid');
    grid.innerHTML = '';

    for (let i = 1; i <= 10; i++) {
      const url = base + '/index.html#station/' + i;
      const card = document.createElement('div');
      card.className = 'qr-card';
      card.innerHTML = `
        <h3>Estación ${i}</h3>
        <div class="sub">Problemas ${(i-1)*2+1} y ${i*2}</div>
        <div class="qr-wrap" id="qr-${i}"></div>
        <div class="url-text">${url}</div>
      `;
      grid.appendChild(card);

      new QRCode(document.getElementById('qr-' + i), {
        text: url,
        width: 160,
        height: 160,
        colorDark: '#1a237e',
        colorLight: '#ffffff',
        correctLevel: QRCode.CorrectLevel.H
      });
    }
  }

  // Auto-generate on load using current URL
  window.addEventListener('load', () => {
    let base = location.href.replace(/qr\.html.*$/, '').replace(/\/$/, '');
    document.getElementById('base-url').value = base;
    generateQRs();
  });
</script>
</body>
</html>
