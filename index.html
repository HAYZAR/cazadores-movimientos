<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cazadores de Movimientos</title>
  <style>
    :root {
      --primary: #1a237e;
      --accent:  #ff6f00;
      --bg:      #f5f7fa;
      --card:    #ffffff;
      --text:    #212121;
      --muted:   #757575;
      --green:   #2e7d32;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-size: 1.15rem; font-weight: 700; }
    header .logo span { color: var(--accent); }
    header .station-badge {
      margin-left: auto;
      background: var(--accent);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: .85rem;
      font-weight: 700;
    }

    /* ── NOT FOUND ── */
    #not-found {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
    }
    #not-found h2 { color: var(--primary); font-size: 1.6rem; margin-bottom: 12px; }
    #not-found p  { color: var(--muted); max-width: 380px; }

    /* ── STATION ── */
    #station-view {
      display: none;
      max-width: 680px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    /* graph card */
    .graph-card {
      background: var(--card);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 2px 16px rgba(0,0,0,.10);
      margin-bottom: 20px;
    }
    .graph-card img { width: 100%; display: block; }
    .graph-card .question {
      padding: 16px 20px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--primary);
      line-height: 1.45;
      border-top: 2px solid var(--bg);
    }

    /* form card */
    .form-card {
      background: var(--card);
      border-radius: 16px;
      padding: 24px 20px;
      box-shadow: 0 2px 16px rgba(0,0,0,.10);
    }
    .form-card h3 {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .field-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }
    @media (max-width: 480px) { .field-group { grid-template-columns: 1fr; } }
    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .field.full { grid-column: 1 / -1; }
    label {
      font-size: .78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    input[type="text"], select, textarea {
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      padding: 9px 12px;
      font-size: .95rem;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    input[type="text"]:focus,
    select:focus,
    textarea:focus { border-color: var(--primary); }
    textarea { resize: vertical; min-height: 90px; }

    .optional-label {
      font-size: .72rem;
      color: #bbb;
      margin-left: 4px;
      font-style: italic;
      text-transform: none;
      letter-spacing: 0;
    }

    .divider {
      border: none;
      border-top: 2px solid var(--bg);
      margin: 18px 0;
    }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s, transform .1s;
    }
    .submit-btn:hover  { opacity: .9; }
    .submit-btn:active { transform: scale(.98); }
    .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

    /* success */
    #success-view {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      max-width: 480px;
      margin: 0 auto;
    }
    #success-view .icon { font-size: 4rem; margin-bottom: 16px; }
    #success-view h2 { color: var(--green); font-size: 1.6rem; margin-bottom: 10px; }
    #success-view p  { color: var(--muted); font-size: 1rem; line-height: 1.5; }
    #success-view .station-info {
      margin-top: 20px;
      background: #e8f5e9;
      border-radius: 12px;
      padding: 14px 20px;
      color: var(--green);
      font-weight: 600;
      font-size: .95rem;
    }

    /* error msg */
    .error-msg {
      display: none;
      background: #ffebee;
      color: #c62828;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .85rem;
      margin-top: 10px;
    }
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">🏃 Cazadores de <span>Movimientos</span></div>
  <div class="station-badge" id="header-badge">–</div>
</header>

<!-- Sin QR válido -->
<div id="not-found">
  <h2>⚠️ Estación no encontrada</h2>
  <p>Escanea el código QR de una estación para acceder al problema.</p>
</div>

<!-- Estación activa -->
<section id="station-view">
  <div class="graph-card">
    <img id="problem-img" src="" alt="Gráfica del problema" />
    <div class="question" id="problem-question"></div>
  </div>

  <div class="form-card">
    <h3>📝 Registra tu respuesta</h3>

    <div class="field-group">
      <div class="field">
        <label>Estudiante 1 <span style="color:red">*</span></label>
        <input type="text" id="name1" placeholder="Nombre completo" required />
      </div>
      <div class="field">
        <label>Estudiante 2 <span style="color:red">*</span></label>
        <input type="text" id="name2" placeholder="Nombre completo" required />
      </div>
      <div class="field">
        <label>Estudiante 3 <span class="optional-label">(opcional)</span></label>
        <input type="text" id="name3" placeholder="Nombre completo" />
      </div>
      <div class="field">
        <label>Grado <span style="color:red">*</span></label>
        <select id="grade">
          <option value="">— Selecciona —</option>
          <option>10°A</option>
          <option>10°B</option>
          <option>10°C</option>
        </select>
      </div>
    </div>

    <hr class="divider" />

    <div class="field">
      <label>Respuesta <span style="color:red">*</span></label>
      <textarea id="answer" placeholder="Escribe aquí tu respuesta..."></textarea>
    </div>

    <div class="error-msg" id="error-msg">Por favor completa todos los campos obligatorios.</div>

    <button class="submit-btn" id="submit-btn" onclick="submitAnswer()">
      Enviar respuesta
    </button>
  </div>
</section>

<!-- Éxito -->
<div id="success-view">
  <div class="icon">✅</div>
  <h2>¡Respuesta enviada!</h2>
  <p>Su respuesta fue registrada correctamente. Continúen con la siguiente estación.</p>
  <div class="station-info" id="success-info"></div>
</div>

<script>
  // ── CONFIGURACIÓN ──────────────────────────────────────────────
  // Reemplaza esta URL por la de tu Google Apps Script desplegado
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxjhvjfyhnz7SHj9EqNTZ2VSlNedbax3tU7cnuQyt2fKAVRIgo_chSf-q6TZCuyMMHVSA/exec";

  const STATIONS = {
    1:  { img: "images/problem_01.jpg", q: "Indica un momento en que el objeto NO está en movimiento." },
    2:  { img: "images/problem_03.jpg", q: "Indica un momento en que el objeto se mueve a su máxima rapidez." },
    3:  { img: "images/problem_05.jpg", q: "¿Cuál es el desplazamiento durante el intervalo de tiempo de 0 a 7 segundos?" },
    4:  { img: "images/problem_07.jpg", q: "Indica un momento en que el objeto está acelerando." },
    5:  { img: "images/problem_09.jpg", q: "¿Cuál es la velocidad entre 0 y 1 segundo?" },
    6:  { img: "images/problem_11.jpg", q: "Indica un momento en que el objeto está acelerando (aumentando su rapidez)." },
    7:  { img: "images/problem_13.jpg", q: "¿Cuál es el desplazamiento en el intervalo de tiempo de 0 a 4 segundos?" },
    8:  { img: "images/problem_15.jpg", q: "¿Cuál es el desplazamiento total durante el intervalo de 0 a 7 segundos?" },
    9:  { img: "images/problem_17.jpg", q: "¿En qué momento el objeto cambia de dirección?" },
    10: { img: "images/problem_19.jpg", q: "¿Cuál es la aceleración en el intervalo de tiempo de 0 a 4 segundos?" }
  };
  // ───────────────────────────────────────────────────────────────

  let currentStation = null;

  function init() {
    const hash = location.hash; // e.g. #station/3
    const m = hash.match(/^#station\/(\d+)$/);
    if (!m) return; // shows not-found
    const id = parseInt(m[1]);
    const s = STATIONS[id];
    if (!s) return;

    currentStation = id;
    document.getElementById('not-found').style.display = 'none';
    document.getElementById('station-view').style.display = 'block';
    document.getElementById('header-badge').textContent = 'Estación ' + id;
    document.getElementById('problem-img').src = s.img;
    document.getElementById('problem-question').textContent = s.q;
    document.title = 'Estación ' + id + ' – Cazadores de Movimientos';
  }

  function submitAnswer() {
    const name1  = document.getElementById('name1').value.trim();
    const name2  = document.getElementById('name2').value.trim();
    const name3  = document.getElementById('name3').value.trim();
    const grade  = document.getElementById('grade').value;
    const answer = document.getElementById('answer').value.trim();
    const errDiv = document.getElementById('error-msg');

    if (!name1 || !name2 || !grade || !answer) {
      errDiv.style.display = 'block';
      return;
    }
    errDiv.style.display = 'none';

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Enviando...';

    const payload = {
      estacion: currentStation,
      pregunta: STATIONS[currentStation].q,
      estudiante1: name1,
      estudiante2: name2,
      estudiante3: name3,
      grado: grade,
      respuesta: answer,
      hora: new Date().toLocaleString('es-CO', { timeZone: 'America/Bogota' })
    };

    // Envío usando no-cors (Google Apps Script lo soporta con GET+params)
    const params = new URLSearchParams(payload).toString();
    fetch(SCRIPT_URL + '?' + params, { method: 'GET', mode: 'no-cors' })
      .then(() => {
        document.getElementById('station-view').style.display = 'none';
        const sv = document.getElementById('success-view');
        sv.style.display = 'flex';
        document.getElementById('success-info').textContent =
          'Estación ' + currentStation + ' · ' + grade + ' · ' + name1 + (name2 ? ' & ' + name2 : '') + (name3 ? ' & ' + name3 : '');
      })
      .catch(() => {
        btn.disabled = false;
        btn.innerHTML = 'Enviar respuesta';
        errDiv.textContent = 'Error de conexión. Verifica tu internet e intenta de nuevo.';
        errDiv.style.display = 'block';
      });
  }

  init();
</script>
</body>
</html>
